<section id="contact" class="section contact">
  <div class="container">
    <div class="contact__box">
      <h2 class="section-title">{{ contactContent().title }}</h2>
      <p class="section-subtitle">
        {{ contactContent().subtitle }}
      </p>
      <div class="contact__actions">
        <a
          class="btn btn-primary"
          href="https://mail.google.com/mail/?view=cm&fs=1&to=laurareyeslarrosa@gmail.com&su=Hola%20Laura!&body=Me%20gustaría%20contactarte%20para%20hablar%20sobre..."
          target="_blank"
          rel="noopener noreferrer"
        >
          {{ contactContent().email }}
        </a>
        <a
          class="btn btn-secondary"
          href="https://www.linkedin.com/in/laura-reyes-a1291946/"
          target="_blank"
          rel="noopener noreferrer"
        >
          {{ contactContent().linkedin }}
        </a>
        <a
          class="btn btn-secondary"
          href="https://github.com/laurareyeslarrosa"
          target="_blank"
          rel="noopener noreferrer"
        >
          {{ contactContent().github }}
        </a>
      </div>
      <p class="contact__note">
        {{ contactContent().note }}
      </p>
    </div>
  </div>
</section>
